<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VetScore | Veterinary Product Ratings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container hero">
  <div>
    <h1>Choose the Right Veterinary Product</h1>
    <p>Real field data. Vet verified results. No guesswork.</p>

    <input id="searchInput" class="search" placeholder="Search product or disease..." />
    <br>
    <button class="btn">Explore Top Rated</button>
  </div>

  <!-- Featured Product -->
  <div class="card">
    <h3 id="featured-name">Loading...</h3>
    <div class="score" id="featured-score">--</div>
    <p id="featured-success">Success Rate: --</p>
    <span class="badge success">Top Rated</span>
  </div>
</div>

<!-- Product Section -->
<div class="section">
  <div class="container">
    <h2>Top Rated Products</h2>

    <div id="product-grid" class="grid">
      <!-- Products will load dynamically here -->
    </div>

  </div>
</div>

<!-- How it works -->
<div class="container" style="margin-top:40px;">
  <h2>How It Works</h2>

  <div class="grid">
    <div class="card">
      <h4>Search</h4>
      <p>Find product or disease</p>
    </div>

    <div class="card">
      <h4>Compare</h4>
      <p>Check scores and outcomes</p>
    </div>

    <div class="card">
      <h4>Decide</h4>
      <p>Choose what actually works</p>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
